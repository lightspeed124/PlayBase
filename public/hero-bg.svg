  <g transform="translate(285,125)">

    <!-- Base inflatable body -->
    <rect x="0" y="168" width="590" height="235" rx="28" fill="#D32F2F"/>

    <!-- Dome top (main bounce area) -->
    <ellipse cx="295" cy="168" rx="300" ry="104" fill="#D32F2F"/>
    <!-- Dome color bands -->
    <ellipse cx="295" cy="168" rx="240" ry="83" fill="#EF6C00"/>
    <ellipse cx="295" cy="168" rx="175" ry="62" fill="#F9A825"/>
    <ellipse cx="295" cy="168" rx="112" ry="42" fill="#EF6C00"/>

    <!-- Banner / flags on top -->
    <polygon points="200,68 215,50 230,68" fill="#E53935"/>
    <polygon points="260,58 275,38 290,58" fill="#1565C0"/>
    <polygon points="320,55 335,35 350,55" fill="#F9A825"/>
    <polygon points="370,62 385,42 400,62" fill="#2E7D32"/>
    <line x1="200" y1="58" x2="400" y2="45" stroke="#555" stroke-width="2" opacity="0.6"/>

    <!-- Bounce chamber interior (mesh look) -->
    <rect x="28" y="175" width="364" height="218" rx="14" fill="#EF9A9A" opacity="0.6"/>
    <!-- Grid lines -->
    <line x1="28" y1="215" x2="392" y2="215" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>
    <line x1="28" y1="258" x2="392" y2="258" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>
    <line x1="28" y1="301" x2="392" y2="301" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>
    <line x1="28" y1="345" x2="392" y2="345" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>
    <line x1="115" y1="175" x2="115" y2="393" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>
    <line x1="210" y1="175" x2="210" y2="393" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>
    <line x1="308" y1="175" x2="308" y2="393" stroke="#C62828" stroke-width="1.5" opacity="0.35"/>

    <!-- Safety net pillars -->
    <rect x="16" y="168" width="20" height="225" rx="9" fill="#4FC3F7"/>
    <rect x="378" y="168" width="20" height="225" rx="9" fill="#4FC3F7"/>

