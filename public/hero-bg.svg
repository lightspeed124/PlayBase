<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E8BC8"/>
      <stop offset="55%" stop-color="#72C1F0"/>
      <stop offset="100%" stop-color="#B8E2FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56B056"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFE566" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grassSheen" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6EC96E"/>
      <stop offset="100%" stop-color="#3A9A3A"/>
    </radialGradient>
  </defs>

  <!-- ─── SKY ─────────────────────────────────────────────────── -->
  <rect width="1400" height="600" fill="url(#sky)"/>

  <!-- ─── SUN ──────────────────────────────────────────────────── -->
  <ellipse cx="1180" cy="95" rx="230" ry="230" fill="url(#sunGlow)"/>
  <g transform="translate(1180,95)">
    <g fill="#FFD700" opacity="0.95">
      <polygon points="0,-95 -11,-65 11,-65"/>
      <polygon points="67,-67 46,-52 52,-46"/>
      <polygon points="95,0 65,-11 65,11"/>
      <polygon points="67,67 52,46 46,52"/>
      <polygon points="0,95 -11,65 11,65"/>
      <polygon points="-67,67 -52,46 -46,52"/>
      <polygon points="-95,0 -65,11 -65,-11"/>
      <polygon points="-67,-67 -46,-52 -52,-46"/>
    </g>
    <circle r="60" fill="#FFD700"/>
    <circle r="50" fill="#FFE566"/>
  </g>

  <!-- ─── CLOUDS ────────────────────────────────────────────────── -->
  <g fill="white" opacity="0.88">
    <ellipse cx="185" cy="98" rx="95" ry="44"/>
    <ellipse cx="248" cy="80" rx="72" ry="42"/>
    <ellipse cx="135" cy="112" rx="62" ry="34"/>
    <ellipse cx="540" cy="72" rx="82" ry="38"/>
    <ellipse cx="600" cy="56" rx="66" ry="36"/>
    <ellipse cx="492" cy="82" rx="58" ry="30"/>
    <ellipse cx="840" cy="85" rx="58" ry="28"/>
    <ellipse cx="888" cy="72" rx="46" ry="26"/>
  </g>

  <!-- ─── DISTANT HILLS / TREELINE ──────────────────────────────── -->
  <ellipse cx="100" cy="430" rx="160" ry="70" fill="#3A8E3A" opacity="0.4"/>
  <ellipse cx="1300" cy="420" rx="150" ry="65" fill="#3A8E3A" opacity="0.35"/>
  <ellipse cx="700" cy="450" rx="800" ry="50" fill="#4CAF50" opacity="0.25"/>

  <!-- ─── GRASS ──────────────────────────────────────────────────── -->
  <path d="M0 455 Q350 440 700 455 Q1050 470 1400 448 L1400 600 L0 600 Z" fill="url(#grass)"/>
  <path d="M0 455 Q350 442 700 457 Q1050 472 1400 450" fill="none" stroke="#6EC96E" stroke-width="5" opacity="0.7"/>

  <!-- ─── TREE LEFT ───────────────────────────────────────────────── -->
  <rect x="62" y="290" width="28" height="175" rx="7" fill="#6D4C41"/>
  <ellipse cx="76" cy="300" rx="80" ry="64" fill="#1B5E20"/>
  <ellipse cx="76" cy="272" rx="64" ry="52" fill="#2E7D32"/>
  <ellipse cx="76" cy="248" rx="48" ry="40" fill="#388E3C"/>
  <ellipse cx="76" cy="230" rx="34" ry="30" fill="#43A047"/>

  <!-- ─── TREE RIGHT BACKGROUND ───────────────────────────────────── -->
  <rect x="1308" y="325" width="22" height="135" rx="5" fill="#6D4C41"/>
  <ellipse cx="1319" cy="338" rx="65" ry="55" fill="#1B5E20"/>
  <ellipse cx="1319" cy="310" rx="52" ry="44" fill="#2E7D32"/>
  <ellipse cx="1319" cy="288" rx="40" ry="34" fill="#388E3C"/>

