    <rect x="-52" y="295" width="56" height="103" rx="10" fill="#EF5350"/>
    <line x1="-52" y1="325" x2="4" y2="325" stroke="#B71C1C" stroke-width="3"/>
    <line x1="-52" y1="358" x2="4" y2="358" stroke="#B71C1C" stroke-width="3"/>

    <!-- SLIDE TOWER (right) -->
    <rect x="410" y="100" width="168" height="298" rx="20" fill="#1565C0"/>
    <ellipse cx="494" cy="100" rx="92" ry="48" fill="#1565C0"/>
    <ellipse cx="494" cy="100" rx="68" ry="34" fill="#1E88E5"/>

    <!-- Climbing holds on tower -->
    <circle cx="442" cy="195" r="14" fill="#42A5F5"/>
    <circle cx="484" cy="228" r="14" fill="#42A5F5"/>
    <circle cx="526" cy="195" r="14" fill="#42A5F5"/>
    <circle cx="564" cy="228" r="14" fill="#64B5F6"/>
    <circle cx="462" cy="163" r="14" fill="#64B5F6"/>
    <circle cx="544" cy="163" r="14" fill="#42A5F5"/>

    <!-- Slide chute (curves down to the right) -->
    <path d="M 568 238 C 628 290 662 345 678 400"
          stroke="#E64A19" stroke-width="46" fill="none" stroke-linecap="round"/>
    <path d="M 568 238 C 628 290 662 345 678 400"
          stroke="#FF7043" stroke-width="28" fill="none" stroke-linecap="round"/>
    <path d="M 562 224 C 618 278 655 332 668 388"
          stroke="#BF360C" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 582 250 C 642 300 672 358 690 410"
          stroke="#BF360C" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── KID 1: jumping inside (arms up, mid-air) ─────────────── -->
  <g transform="translate(415,330)" fill="#5D4037">
    <circle cx="0" cy="-88" r="20"/>
    <line x1="0" y1="-68" x2="0" y2="-20" stroke="#5D4037" stroke-width="14" stroke-linecap="round"/>
    <line x1="0" y1="-55" x2="-30" y2="-82" stroke="#5D4037" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="-55" x2="30" y2="-82" stroke="#5D4037" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="-16" y2="14" stroke="#5D4037" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="16" y2="14" stroke="#5D4037" stroke-width="11" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M -7 -83 Q 0 -76 7 -83" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── KID 2: jumping inside (arms wide) ────────────────────── -->
  <g transform="translate(520,318)" fill="#795548">
    <circle cx="0" cy="-78" r="17"/>
    <line x1="0" y1="-61" x2="0" y2="-18" stroke="#795548" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="-50" x2="-32" y2="-44" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="-50" x2="32" y2="-38" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="-18" x2="-18" y2="12" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="-18" x2="18" y2="12" stroke="#795548" stroke-width="10" stroke-linecap="round"/>
    <path d="M -6 -73 Q 0 -66 6 -73" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── KID 3: on slide, sliding down ──────────────────────────── -->
  <g transform="translate(956,400) rotate(20)" fill="#6D4C41">
    <circle cx="0" cy="-52" r="16"/>
    <line x1="0" y1="-36" x2="0" y2="5" stroke="#6D4C41" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="-22" y2="-15" stroke="#6D4C41" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="22" y2="-18" stroke="#6D4C41" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="-12" y2="26" stroke="#6D4C41" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="5" x2="12" y2="26" stroke="#6D4C41" stroke-width="9" stroke-linecap="round"/>
    <path d="M -5 -47 Q 0 -41 5 -47" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
