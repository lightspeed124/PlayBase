  <!-- ─── KID 4: running toward bounce house on grass ─────────── -->
  <g transform="translate(240,440)" fill="#4E342E">
    <circle cx="0" cy="-60" r="15"/>
    <line x1="0" y1="-45" x2="0" y2="-8" stroke="#4E342E" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="-34" x2="-22" y2="-18" stroke="#4E342E" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="-34" x2="20" y2="-48" stroke="#4E342E" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="-18" y2="16" stroke="#4E342E" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="15" y2="8" stroke="#4E342E" stroke-width="9" stroke-linecap="round"/>
    <path d="M -5 -55 Q 0 -49 5 -55" stroke="#FFE0B2" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── PARENTS chatting on the right ─────────────────────────── -->
  <!-- Parent 1 (adult, standing, holding cup) -->
  <g transform="translate(1118,375)" fill="#4E342E">
    <circle cx="0" cy="-118" r="24"/>
    <ellipse cx="-3" cy="-135" rx="19" ry="9" fill="#212121"/>
    <line x1="0" y1="-94" x2="0" y2="-26" stroke="#4E342E" stroke-width="18" stroke-linecap="round"/>
    <line x1="0" y1="-80" x2="-32" y2="-60" stroke="#4E342E" stroke-width="12" stroke-linecap="round"/>
    <rect x="-46" y="-65" width="15" height="20" rx="4" fill="#FF8F00"/>
    <line x1="0" y1="-80" x2="28" y2="-66" stroke="#4E342E" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="-26" x2="-14" y2="50" stroke="#4E342E" stroke-width="14" stroke-linecap="round"/>
    <line x1="0" y1="-26" x2="14" y2="50" stroke="#4E342E" stroke-width="14" stroke-linecap="round"/>
    <path d="M -8 -113 Q 0 -105 8 -113" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Parent 2 (turned slightly, gesturing, talking) -->
  <g transform="translate(1200,380)" fill="#37474F">
    <circle cx="0" cy="-112" r="22"/>
    <ellipse cx="2" cy="-128" rx="17" ry="8" fill="#5D4037"/>
    <line x1="0" y1="-90" x2="0" y2="-26" stroke="#37474F" stroke-width="16" stroke-linecap="round"/>
    <line x1="0" y1="-76" x2="-28" y2="-62" stroke="#37474F" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="-74" x2="30" y2="-88" stroke="#37474F" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="-26" x2="-13" y2="44" stroke="#37474F" stroke-width="13" stroke-linecap="round"/>
    <line x1="0" y1="-26" x2="13" y2="44" stroke="#37474F" stroke-width="13" stroke-linecap="round"/>
    <path d="M -7 -107 Q 0 -100 7 -107" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ─── GROUND SHADOWS for depth ─────────────────────────────── -->
  <ellipse cx="575" cy="458" rx="320" ry="16" fill="#1B5E20" opacity="0.30"/>
  <ellipse cx="415" cy="452" rx="26" ry="8" fill="#1B5E20" opacity="0.38"/>
  <ellipse cx="520" cy="450" rx="22" ry="7" fill="#1B5E20" opacity="0.38"/>
  <ellipse cx="240" cy="455" rx="22" ry="7" fill="#1B5E20" opacity="0.32"/>
  <ellipse cx="1162" cy="448" rx="65" ry="12" fill="#1B5E20" opacity="0.30"/>

  <!-- ─── SUNLIGHT SPARKLES ─────────────────────────────────────── -->
  <g fill="#FFE566" opacity="0.55">
    <polygon points="385,148 388,142 391,148 385,145 391,145" transform="scale(1.4) translate(-60,0)"/>
    <polygon points="720,110 723,104 726,110 720,107 726,107"/>
    <polygon points="860,170 863,164 866,170 860,167 866,167" transform="scale(0.9)"/>
  </g>
</svg>
